###############
# ENV (NVIDIA)
###############
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_SESSION_TYPE,x11
env = QT_QPA_PLATFORM,xcb


###############
# MONITORS
###############

# RIGHT monitor (main)
monitor=DP-1,1920x1080@144,1920x0,1

# LEFT monitor (secondary)
monitor=HDMI-A-2,1920x1080@60,0x0,1



###############
# WORKSPACES
###############


workspace=1,monitor:DP-2
workspace=2,monitor:DP-2
workspace=3,monitor:DP-2
workspace=4,monitor:DP-2
workspace=5,monitor:HDMI-A-2
workspace=6,monitor:HDMI-A-2

###############
# GENERAL
###############
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    resize_on_border = true
    layout = dwindle
}

###############
# DECORATION
###############
decoration {
    rounding = 6
}

###############
# testing 
###############

 xwayland {

force_zero_scaling = true

} 


###############
# ANIMATIONS
###############
animations {
    enabled = yes
    bezier = easeOut, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 7, easeOut, popin
    animation = border, 1, 6, easeOut
    animation = fade, 1, 6, easeOut
    animation = workspaces, 1, 6, easeOut
}

###############
# MISC
###############
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

###############
# INPUT
###############
input {
    kb_layout = us 
    follow_mouse = 1
}

###############
# AUTOSTART
###############
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hypridle
exec-once = hyprlock
exec-once = hyprpaper
exec-once = swaync

###############
# KEYBINDS
###############
$mod = SUPER

bind = $mod, RETURN, exec, kitty
bind = $mod, D, exec, wofi --show drun
bind = $mod, Q, killactive
bind = $mod, SPACE, togglefloating
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen, 1

bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bind = ,XF86AudioLowerVolume, exec, pamixer -d 5
bind = ,XF86AudioMute, exec, pamixer -t

bind = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = $mod SHIFT, F, fullscreen, 0

bind = $mod SHIFT, SPACE, togglefloating
binds {
    drag_threshold = 10  # Fire a drag event only after dragging for more than 10px
}
bindm = ALT, mouse:272, movewindow      # ALT + LMB: Move a window by dragging more than 10px.
bindc = ALT, mouse:272, togglefloating  # ALT + LMB: Floats a window by clicking

# ========= Screenshots (hyprshot) =========

bind = , Print, exec, hyprshot -m output -o ~/Pictures/screenshots --clipboard
bind = ALT, Print, exec, hyprshot -m window -m active -o ~/Pictures/screenshots --clipboard
bind = SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/screenshots --clipboard

# Everforest colors (matching Kitty)
$bg       = rgb(2b3339)
$fg       = rgb(d3c6aa)
$accent   = rgb(a7c080)
$border   = rgb(475258)

# General appearance
general {
    col.active_border = $accent $border 45deg
    col.inactive_border = $border
    border_size = 3 
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false
}

animations {
    # keep whatever you had here or leave blank
}

#can't remember what this one does
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#this is to fix the open with problem using dolphin + hyprland
env = XDG_MENU_PREFIX,arch-
exec-once = kbuildsycoca6 --noincremental

